<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eventos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Eventos Académicos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/eventos/listado.html">Eventos</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="container my-4">
    <h1>Eventos disponibles</h1>
    <div class="btn-group mb-3" role="group">
        <button type="button" class="btn btn-outline-secondary" id="btn-vista-lista">Lista</button>
        <button type="button" class="btn btn-outline-secondary" id="btn-vista-grid">Tarjetas</button>
    </div>
    <div id="vista-lista">
        <table class="table">
            <thead><tr><th>Título</th><th>Fecha</th><th>Lugar</th><th>Cupo</th><th></th></tr></thead>
            <tbody id="tabla-eventos-body"></tbody>
        </table>
    </div>
    <div id="vista-grid" class="d-none" style="display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:1rem;">
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/eventos.js"></script>
</body>
</html>
