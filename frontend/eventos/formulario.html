<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de evento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Eventos Académicos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/eventos/mis-eventos.html">Mis eventos</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="container my-4">
    <h1>Crear / editar evento</h1>
    <!-- El id del evento a editar (si aplica) se lee de la query string: formulario.html?id=123 -->
    <!-- TODO: fetch POST /api/organizador/eventos (crear) o /api/organizador/eventos/{id} (editar) -->
    <form id="form-evento">
        <div class="mb-3">
            <label for="titulo" class="form-label">Título</label>
            <input type="text" class="form-control" id="titulo" name="titulo" required>
        </div>
        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea class="form-control" id="descripcion" name="descripcion" rows="4"></textarea>
        </div>
        <div class="mb-3">
            <label for="fechaHora" class="form-label">Fecha y hora</label>
            <input type="datetime-local" class="form-control" id="fechaHora" name="fechaHora" required>
        </div>
        <div class="mb-3">
            <label for="lugar" class="form-label">Lugar</label>
            <input type="text" class="form-control" id="lugar" name="lugar" required>
        </div>
        <div class="mb-3">
            <label for="cupoMaximo" class="form-label">Cupo máximo</label>
            <input type="number" min="1" class="form-control" id="cupoMaximo" name="cupoMaximo" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar</button>
    </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/eventos.js"></script>
</body>
</html>
