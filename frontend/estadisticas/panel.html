<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Estadísticas del evento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Eventos Académicos</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/eventos/mis-eventos.html">Mis eventos</a></li>
            </ul>
        </div>
    </div>
</nav>
<main class="container my-4">
    <h1>Resumen del evento</h1>
    <div class="row mb-4">
        <div class="col"><div class="card"><div class="card-body"><h5>Total inscritos</h5><p id="total-inscritos">-</p></div></div></div>
        <div class="col"><div class="card"><div class="card-body"><h5>Total asistentes</h5><p id="total-asistentes">-</p></div></div></div>
        <div class="col"><div class="card"><div class="card-body"><h5>% de asistencia</h5><p id="porcentaje-asistencia">-</p></div></div></div>
    </div>
    <canvas id="grafico-inscripciones-por-dia"></canvas>
    <canvas id="grafico-asistencia-por-hora"></canvas>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/config.js"></script>
<script src="/js/estadisticas.js"></script>
</body>
</html>
