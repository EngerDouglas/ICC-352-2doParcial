services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: gestion-eventos-academicos-backend:latest
    container_name: eventos-app
    restart: unless-stopped
    environment:
      - PORT=7070
    volumes:
      - eventos-data:/app/data
    expose:
      - "7070"
    networks: [eventos-net]

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: eventos-proxy
    restart: unless-stopped
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    networks: [eventos-net]

networks:
  eventos-net:
    driver: bridge

volumes:
  eventos-data:
    driver: local
